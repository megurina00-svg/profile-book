<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフ帳メーカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== 編集画面（テンプレート上に直接入力） ========== -->
  <div id="edit-screen" class="screen">
    <div class="toolbar">
      <p class="toolbar-hint">点線のところに入力してね☆</p>
      <button id="generate-btn" class="btn btn-primary">✨ 完成画像を作る</button>
    </div>
    <!-- テンプレート画像 + 入力オーバーレイ -->
    <div class="template-wrap" id="template-wrap">
      <img id="template-img" src="assets/profile-template.png" alt="プロフ帳テンプレート">
      <div class="overlay" id="overlay">
        <!-- script.js で自動生成 -->
      </div>
    </div>
  </div>

  <!-- ========== プレビュー画面（長押し保存用） ========== -->
  <div id="preview-screen" class="screen hidden">
    <div class="toolbar">
      <button id="back-btn" class="btn btn-secondary">← 戻って編集する</button>
      <p class="toolbar-hint">📱 画像を長押しして保存してね♪</p>
    </div>
    <div class="preview-wrap">
      <img id="preview-img" alt="完成したプロフ帳">
    </div>
  </div>

  <!-- 描画専用 Canvas（非表示） -->
  <canvas id="canvas" style="display:none;"></canvas>

  <script src="script.js"></script>
</body>
</html>
